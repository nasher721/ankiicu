services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ankiicu
    ports:
      - "5432:5432"
    volumes:
      - ankiicu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ankiicu"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  ankiicu_pgdata:
